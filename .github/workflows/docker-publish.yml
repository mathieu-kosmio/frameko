name: Build & publish Docker image

# Construit l'image Frameko et la publie sur GitHub Container Registry (GHCR).
# Le build se fait dans GitHub Actions (pas sur la machine locale). Coolify tire
# ensuite l'image ghcr.io/<owner>/frameko:latest pour déployer.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'proto/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:        # déclenchement manuel depuis l'onglet Actions

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ex. mathieu-kosmio/frameko

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write                    # nécessaire pour pousser sur GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: proto                 # le Dockerfile attend le contexte = proto/
          file: proto/Dockerfile
          push: true
          platforms: linux/amd64         # cible serveur standard ; ajouter ,linux/arm64 si besoin
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
